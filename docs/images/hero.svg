<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Codex Meter for macOS</title>
  <desc id="desc">A dark native macOS menu bar app showing Codex quota, model usage and local API-equivalent cost estimates.</desc>
  <rect width="1200" height="560" fill="#0d0e10"/>
  <path d="M0 494H1200" stroke="#26282d"/>
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="72" y="112" fill="#f4f5f7" font-size="18" font-weight="600" letter-spacing="2">CODEX METER</text>
    <text x="72" y="179" fill="#f4f5f7" font-size="48" font-weight="650">Know what’s left.</text>
    <text x="72" y="237" fill="#f4f5f7" font-size="48" font-weight="650">Know what used it.</text>
    <text x="72" y="292" fill="#a5a8ae" font-size="20">A private, native usage meter for your Mac.</text>
    <text x="72" y="330" fill="#a5a8ae" font-size="20">No account. No tracker. No fake estimates.</text>
    <rect x="72" y="378" width="124" height="42" rx="8" fill="#087ff5"/>
    <text x="96" y="405" fill="#ffffff" font-size="15" font-weight="600">macOS 13+</text>
    <text x="216" y="405" fill="#74777e" font-size="15">Free · Open source · Swift</text>
  </g>
  <g transform="translate(680 42)" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <rect width="438" height="470" rx="18" fill="#17181b" stroke="#34363c"/>
    <circle cx="35" cy="35" r="17" fill="#0b65b9"/>
    <path d="M27 38a9 9 0 1 1 16 0M35 35l5-5" fill="none" stroke="#75baff" stroke-width="2" stroke-linecap="round"/>
    <text x="62" y="31" fill="#f4f5f7" font-size="15" font-weight="650">Codex Meter</text>
    <text x="62" y="49" fill="#8d9097" font-size="11">Updated now · Plus</text>
    <path d="M0 70H438" stroke="#2b2d32"/>
    <text x="24" y="105" fill="#d9dbe0" font-size="12" font-weight="600">Weekly limit</text>
    <text x="24" y="122" fill="#8d9097" font-size="11">Resets in 6 days</text>
    <text x="367" y="112" fill="#f4f5f7" font-size="23" font-weight="650">32%</text>
    <rect x="24" y="142" width="390" height="7" rx="3" fill="#303238"/>
    <rect x="24" y="142" width="125" height="7" rx="3" fill="#087ff5"/>
    <path d="M0 174H438" stroke="#2b2d32"/>
    <text x="24" y="207" fill="#d9dbe0" font-size="12" font-weight="600">Local activity</text>
    <text x="24" y="224" fill="#8d9097" font-size="10">Seven days · only on this Mac</text>
    <text x="355" y="207" fill="#f4f5f7" font-size="18" font-weight="650">803.7M</text>
    <g fill="#087ff5">
      <rect x="34" y="271" width="35" height="12" rx="2" opacity=".35"/>
      <rect x="88" y="255" width="35" height="28" rx="2"/>
      <rect x="142" y="264" width="35" height="19" rx="2" opacity=".55"/>
      <rect x="196" y="283" width="35" height="0" rx="2"/>
      <rect x="250" y="248" width="35" height="35" rx="2"/>
      <rect x="304" y="225" width="35" height="58" rx="2"/>
      <rect x="358" y="202" width="35" height="81" rx="2"/>
    </g>
    <g fill="#74777e" font-size="9" text-anchor="middle">
      <text x="51" y="298">TH</text><text x="105" y="298">F</text><text x="159" y="298">SA</text>
      <text x="213" y="298">SU</text><text x="267" y="298">M</text><text x="321" y="298">TU</text><text x="375" y="298">W</text>
    </g>
    <g font-size="10">
      <text x="24" y="330" fill="#d9dbe0" font-weight="600">gpt-5.6-sol</text><text x="253" y="330" fill="#8d9097">59% · 470.8M</text><text x="372" y="330" fill="#d9dbe0">US$324.63</text>
      <text x="24" y="353" fill="#d9dbe0" font-weight="600">gpt-5.6-luna</text><text x="253" y="353" fill="#8d9097">37% · 294.6M</text><text x="378" y="353" fill="#d9dbe0">US$46.80</text>
      <text x="24" y="376" fill="#d9dbe0" font-weight="600">gpt-5.6-terra</text><text x="253" y="376" fill="#8d9097">5% · 38.2M</text><text x="378" y="376" fill="#d9dbe0">US$16.02</text>
    </g>
    <path d="M24 398H414" stroke="#2b2d32"/>
    <text x="24" y="425" fill="#8d9097" font-size="10">Today 308.3M</text>
    <text x="264" y="425" fill="#d9dbe0" font-size="10">API-equivalent ≈ US$387.46</text>
    <text x="24" y="449" fill="#686b72" font-size="9">Official prices · local model attribution · estimate only</text>
  </g>
  <text x="72" y="522" fill="#5f6269" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12">THE JHYE FACTOR · INDEPENDENT COMMUNITY PROJECT</text>
</svg>
