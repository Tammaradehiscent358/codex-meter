name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Build universal app
        run: ./scripts/build-app.sh dist
      - name: Package app
        run: |
          ditto -c -k --norsrc --noextattr --noqtn --noacl --keepParent \
            "dist/Codex Meter.app" "Codex-Meter-${GITHUB_REF_NAME#v}.zip"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "Codex-Meter-${GITHUB_REF_NAME#v}.zip" \
            --title "Codex Meter ${GITHUB_REF_NAME#v}" \
            --generate-notes
